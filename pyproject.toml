[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "SIM", # flake8-simplify
]
ignore = [
    "E501",  # line too long — enforced by formatter, not linter
    "B008",  # do not perform function calls in default arguments (FastAPI Depends)
    "SIM108", # ternary operator — sometimes less readable
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101"]  # assert is fine in tests

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

# --- Assessment gates (see docs/assessment/README.md for the ratchet) ---------

[tool.mypy]
python_version = "3.12"
# The pydantic v2 mypy plugin understands BaseSettings (fields are populated from
# the environment), so `Settings()` with no args is correctly typed — without it
# mypy flags every required field as a missing call-arg.
plugins = ["pydantic.mypy"]
ignore_missing_imports = true   # gradual: don't fail on untyped third-party stubs
warn_unused_ignores = true
warn_redundant_casts = true
exclude = ['^alembic/', '^tests/']
# mypy_errors is at 0 (baseline). Follow-up to ratchet ON (CLAUDE.md "type hints on
# every signature", mechanically enforced): ~17 remaining, mostly Celery bound-task
# `self` params (def task(self, ...)) plus a handful of genuinely-untyped helpers
# (worker/storage.py, ingestion/transcribe.py, dna/embeddings.py, youtube/analytics.py).
# Annotating Celery `self` is non-idiomatic — decide on a per-module override or a
# typed Task base before enabling. Tracked under Issue 75.
# disallow_untyped_defs = true
# disallow_incomplete_defs = true

[tool.coverage.run]
branch = true
omit = ["tests/*", "alembic/*", "*/__init__.py"]

[tool.coverage.report]
show_missing = true
skip_covered = false

[tool.bandit]
exclude_dirs = ["tests", "alembic", ".venv"]
