[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "SIM", # flake8-simplify
]
ignore = [
    "E501",  # line too long — enforced by formatter, not linter
    "B008",  # do not perform function calls in default arguments (FastAPI Depends)
    "SIM108", # ternary operator — sometimes less readable
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101"]  # assert is fine in tests

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

# --- Assessment gates (see docs/assessment/README.md for the ratchet) ---------

[tool.mypy]
python_version = "3.12"
plugins = ["pydantic.mypy"]   # type BaseSettings/BaseModel correctly (no spurious call-arg)
ignore_missing_imports = true   # gradual: don't fail on untyped third-party stubs
warn_unused_ignores = true
warn_redundant_casts = true
exclude = ['^alembic/', '^tests/']
# Ratchet ON now that mypy_errors reached 0 (Issue 78c) — mechanically enforces
# CLAUDE.md's "type hints on every signature" rule.
disallow_untyped_defs = true
disallow_incomplete_defs = true

[tool.coverage.run]
branch = true
omit = ["tests/*", "alembic/*", "*/__init__.py"]

[tool.coverage.report]
show_missing = true
skip_covered = false

[tool.bandit]
exclude_dirs = ["tests", "alembic", ".venv"]
