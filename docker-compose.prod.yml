services:
  app:
    # ${IMAGE_TAG:-latest}: normal deploys leave IMAGE_TAG unset (→ :latest,
    # unchanged behavior); the deploy.yml auto-rollback sets IMAGE_TAG=rollback
    # after re-tagging the previous digest. Hardcoding :latest here made the
    # Issue 271 rollback a no-op image swap (fixed with Issue 298).
    image: ghcr.io/reese8272/creatorclip:${IMAGE_TAG:-latest}
    restart: unless-stopped
    # No host port is published: inbound traffic arrives only via the Cloudflare
    # Tunnel (cloudflared → app:8000 on the internal network). Nothing is exposed
    # on the VM's public interface.
    env_file: .env
    # Production server: drop the dev --reload from the image CMD.
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - autoheal=true
    healthcheck:
      # Liveness only: /health returns 200 even when a dependency is degraded,
      # so this restarts the app only when it stops serving — not for a DB blip.
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=5).status==200 else 1)"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  worker:
    image: ghcr.io/reese8272/creatorclip:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A worker.celery_app worker --loglevel=info --concurrency=4
    labels:
      - autoheal=true
    healthcheck:
      test: ["CMD-SHELL", "celery -A worker.celery_app inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 60s

  beat:
    image: ghcr.io/reese8272/creatorclip:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A worker.celery_app beat --loglevel=info

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: creatorclip
      POSTGRES_USER: creatorclip
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U creatorclip -d creatorclip"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    # Broker durability (Issue 288): AOF everysec = ≤1s loss window on crash
    # (pinned explicitly; it is Redis's default when AOF is on). --save gives an
    # RDB floor so BGSAVE-based backups (scripts/backup_redis.sh) have a snapshot.
    # Queued-task recovery beyond this window = re-enqueue from DB status rows
    # (docs/RUNBOOKS.md "Redis broker durability & recovery").
    command: redis-server --appendonly yes --appendfsync everysec --save 300 100
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Cloudflare Tunnel: routes https://autoclip.studio → app:8000 with no open
  # inbound ports on the VM. The token (and the hostname→service ingress rule) is
  # configured in the Cloudflare Zero Trust dashboard; see docs/ACCESS.md.
  cloudflared:
    image: cloudflare/cloudflared:latest  # beta: pin to a dated release for production
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - app

  # Auto-recovery: Docker has no native "restart on unhealthy", so this sidecar
  # watches the docker socket and restarts any container labelled autoheal=true
  # that reports an unhealthy healthcheck. See docs/SECRETS.md / docs/DEPLOYMENT.md.
  autoheal:
    image: willfarrell/autoheal:1.2.0
    restart: unless-stopped
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal
      AUTOHEAL_INTERVAL: "10"
      AUTOHEAL_START_PERIOD: "60"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  postgres_data:
  redis_data:
