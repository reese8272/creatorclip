apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "creatorclip.name" . }}-app
  labels:
    {{- include "creatorclip.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
spec:
  replicas: {{ .Values.replicaCount.app }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "creatorclip.name" . }}
      app.kubernetes.io/component: app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "creatorclip.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: app
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: app
          image: {{ include "creatorclip.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2"]
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          {{- include "creatorclip.envFrom" . | nindent 10 }}
          resources:
            {{- toYaml .Values.resources.app | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
        {{- if .Values.pgbouncer.enabled }}
        - name: pgbouncer
          image: {{ .Values.pgbouncer.image }}
          ports:
            - name: pgbouncer
              containerPort: 5432
          env:
            - name: PGBOUNCER_POOL_MODE
              value: {{ .Values.pgbouncer.poolMode | quote }}
            - name: PGBOUNCER_MAX_CLIENT_CONN
              value: {{ .Values.pgbouncer.maxClientConn | quote }}
            - name: PGBOUNCER_DEFAULT_POOL_SIZE
              value: {{ .Values.pgbouncer.defaultPoolSize | quote }}
          envFrom:
            - secretRef:
                name: {{ .Values.envSecretName }}
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
        {{- end }}
