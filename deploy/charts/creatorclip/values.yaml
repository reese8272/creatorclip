# Default values — override in values.prod.yaml or via --set on deploy.

image:
  repository: gcr.io/YOUR_PROJECT_ID/creatorclip
  tag: latest
  pullPolicy: Always

replicaCount:
  app: 2
  beat: 1

# Resource limits for each component.
# Tune after observing real usage; these are conservative starting points.
resources:
  app:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
  worker:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2000m"
      memory: "2Gi"
  beat:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "250m"
      memory: "512Mi"

# Horizontal Pod Autoscaler for the FastAPI app.
hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

# KEDA ScaledObject for Celery workers — scales on Redis queue depth.
keda:
  enabled: true
  minReplicas: 1
  maxReplicas: 20
  # Scale up when the Celery queue has more than this many tasks per worker replica.
  queueDepthPerReplica: "5"
  # Name of the Celery default queue key in Redis.
  redisQueueName: "celery"

# Ingress (nginx-ingress + Cloudflare Tunnel or external LB).
ingress:
  enabled: true
  className: "nginx"
  host: "app.creatorclip.com"
  # TLS is terminated at Cloudflare; internal traffic can be HTTP.
  # Set tls.enabled=true if terminating TLS at the ingress.
  tls:
    enabled: false
    secretName: "creatorclip-tls"

# Service configuration for the FastAPI app.
service:
  type: ClusterIP
  port: 80
  targetPort: 8000

# Redis — use a managed service in production (Upstash / Cloud Memorystore).
# Set this to the Redis connection URL from your managed provider.
# For HA (Issue 263): production must use a managed Redis endpoint
# (GCP Memorystore with read replica, or Upstash Redis). Beat HA via
# RedBeat requires Redis to survive a restart so the distributed lock TTL
# (1500s) remains live, preventing duplicate task scheduling.
redis:
  url: "redis://redis-service:6379/0"
  # haUrl: override in values.prod.yaml with the managed HA Redis endpoint.
  # When set, REDBEAT_REDIS_URL in the beat/worker pods is populated from this.
  haUrl: ""

# External secrets — reference your GCP Secret Manager / Doppler project.
# The secret named here must contain all required env vars as key/value pairs.
# Create with: kubectl create secret generic creatorclip-env --from-env-file=.env
externalSecret:
  enabled: false
  provider: "gcpsm"           # gcpsm | doppler | aws
  gcpProjectId: "YOUR_GCP_PROJECT_ID"
  secretName: "creatorclip-prod-env"
  k8sSecretName: "creatorclip-env"

# When externalSecret.enabled=false, set these directly (dev/staging only).
# In production always use externalSecret or mount from a secrets manager.
envSecretName: "creatorclip-env"

# PgBouncer connection pooler sidecar for the app deployment.
# Image: edoburu/pgbouncer v1.25.2-p0 — the actively-maintained, freely-available
# open-source image; bitnami/pgbouncer is now commercial-only (Issue 264).
# Pinned by digest to prevent supply-chain tag-mutation (Issue 264).
pgbouncer:
  enabled: true
  image: "edoburu/pgbouncer:v1.25.2-p0@sha256:7d7a27d9e90985cab5cf42256f5c13a3120baa4b055b69df37beb272b89b2340"
  poolMode: "transaction"
  maxClientConn: 1000
  # defaultPoolSize per-pod: app pool_size+max_overflow = 20 (db.py), sidecar
  # must be ≥ that. 25 leaves 5-conn headroom for probe connections.
  defaultPoolSize: 25

# PgBouncer sidecar for the worker deployment (Issue 259).
# Workers connect to localhost:5432 (the sidecar) which proxies to Cloud SQL.
# Budget: KEDA maxReplicas(50) × defaultPoolSize(5) = 250 worker server conns.
# Combined fleet inequality (docs/DEPLOYMENT.md):
#   app_server_conns + worker_server_conns ≤ Cloud SQL max_connections − reserved
#   HPA_max(20) × 25 + KEDA_max(50) × 5 = 500 + 250 = 750
# Cloud SQL max_connections depends on instance RAM; must satisfy 750 ≤ max_conns − 10.
# A db-custom-2-8192 (2vCPU/8GB) instance yields ~1,000 max_connections — budget satisfied.
# OPEN QUESTION: confirm Cloud SQL instance tier in docs/DECISIONS.md before prod launch.
worker:
  pgbouncer:
    enabled: true
    image: "edoburu/pgbouncer:v1.25.2-p0@sha256:7d7a27d9e90985cab5cf42256f5c13a3120baa4b055b69df37beb272b89b2340"
    poolMode: "transaction"
    maxClientConn: 200
    # 5 server-side connections per worker pod: sized for --concurrency=2
    # (admin_engine pool_size=2, max_overflow=2 = 4 max; +1 headroom).
    defaultPoolSize: 5
