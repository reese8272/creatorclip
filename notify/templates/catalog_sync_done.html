<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your video catalog has been updated</title>
</head>
<body style="font-family: sans-serif; color: #1a1a1a; max-width: 600px; margin: 0 auto; padding: 24px;">
  <h2 style="font-size: 20px; margin-bottom: 8px;">Your video catalog has been updated</h2>
  <p>Hi {{ creator.channel_title or "there" }},</p>
  <p>
    Your YouTube catalog has been synced successfully. Your latest videos and
    analytics are now up to date.
  </p>
  <p style="margin: 24px 0;">
    <a href="{{ app_url }}/app/dashboard"
       style="background: #4f46e5; color: #fff; text-decoration: none;
              padding: 12px 24px; border-radius: 6px; font-weight: 600;">
      View your catalog
    </a>
  </p>
  <hr style="border: none; border-top: 1px solid #e5e7eb; margin: 24px 0;">
  <p style="font-size: 12px; color: #999;">CreatorClip &mdash; autoclip.studio</p>
</body>
</html>
