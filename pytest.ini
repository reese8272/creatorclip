[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
addopts = -m "not integration and not quarantine and not llm_live"
markers =
    integration: requires live postgres + redis (excluded from default CI run)
    quarantine: known-flaky test under repair — collected and run but failure is non-blocking
    # (Issue 268) A quarantined test MUST NOT be skipped or deleted; it is excluded from the
    # gating lane (-m "not integration and not quarantine") until the underlying flake is fixed.
    # Lifecycle: quarantine → fix root cause → remove marker → re-add to gating lane.
    llm_live: requires RUN_LLM_LIVE=1 + real ANTHROPIC_API_KEY (Issue 319); excluded from default
    # CI run; executed by .github/workflows/llm-e2e-nightly.yml on schedule + workflow_dispatch.
    not_llm_live: always-running guard tests inside test_llm_live.py that verify the mark itself
