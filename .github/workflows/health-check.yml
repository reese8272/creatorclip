name: Production health check

# MANUAL smoke test only. Continuous production uptime monitoring is owned by
# **Cloudflare Health Checks** (edge-probed, real alerting) — see
# docs/DEPLOYMENT.md → "Production health monitoring". The old `schedule` trigger
# was removed in Issue 144: the prod URL sits behind Cloudflare Bot Fight Mode,
# which serves a 403 JS-challenge to GitHub-hosted datacenter IPs even though the
# origin is healthy, so a cron probe here false-reds every run.
#
# Probing the Cloudflare-fronted prod URL from a GH-hosted runner WILL 403 by
# design. For a useful manual run, pass `url` pointing at a non-challenged target
# (the origin IP, or a staging URL not behind Bot Fight Mode).
on:
  workflow_dispatch:
    inputs:
      url:
        description: "Base URL to check (overrides the PRODUCTION_URL variable)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  health:
    name: /health probe
    runs-on: ubuntu-latest
    # Only run against a real deployment — skip if secret is not configured
    if: vars.PRODUCTION_URL != '' || github.event.inputs.url != ''

    steps:
      - name: Resolve target URL
        id: url
        run: |
          TARGET="${{ github.event.inputs.url || vars.PRODUCTION_URL }}"
          echo "target=${TARGET}" >> "$GITHUB_OUTPUT"

      - name: Probe /health
        id: probe
        run: |
          TARGET="${{ steps.url.outputs.target }}/health"
          # A realistic User-Agent + retries: a bare `curl` from a GitHub-hosted
          # datacenter IP can be challenged/blocked by the Cloudflare edge even when
          # the origin is healthy. Retry to ride out transient edge challenges and
          # capture the real HTTP code for diagnosis. (Issue 144)
          UA="CreatorClip-HealthCheck/1.0 (+https://autoclip.studio)"
          CODE=""; BODY=""
          for i in 1 2 3 4 5; do
            OUT=$(curl -s --max-time 10 -A "$UA" -w $'\n%{http_code}' "$TARGET" || true)
            CODE="${OUT##*$'\n'}"
            BODY="${OUT%$'\n'*}"
            echo "Attempt $i: HTTP ${CODE:-<none>}"
            [ "$CODE" = "200" ] && break
            [ "$i" -lt 5 ] && sleep 10
          done
          echo "response=${BODY}" >> "$GITHUB_OUTPUT"
          echo "http_code=${CODE}" >> "$GITHUB_OUTPUT"
          if [ "$CODE" != "200" ]; then
            echo "::error::/health returned HTTP ${CODE:-<none>} (origin may be healthy — check for an edge/WAF block)"
            echo "Body (first 500 chars): $(echo "$BODY" | head -c 500)"
            exit 1
          fi
          echo "$BODY" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d.get('status') == 'ok', f'status not ok: {d}'
          assert d.get('postgres') == 'ok', f'postgres degraded: {d}'
          assert d.get('redis') == 'ok', f'redis degraded: {d}'
          print('All systems ok:', d)
          "

      - name: Alert on failure
        if: failure()
        run: |
          echo "::error::Health check FAILED for ${{ steps.url.outputs.target }}"
          echo "Response was: ${{ steps.probe.outputs.response }}"
          # In production, replace this step with your alerting integration
          # (PagerDuty, Slack webhook, etc.) by adding a step here that
          # posts to SLACK_WEBHOOK_URL or PAGERDUTY_KEY secrets.
          exit 1
