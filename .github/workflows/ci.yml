name: CI

# Single PR/main gate. Consolidates the former ci.yml (lint/unit/docker),
# quality.yml (mypy/bandit/pip-audit/coverage), and integration.yml (postgres+redis)
# into one workflow with parallel jobs so a PR shows one coherent status surface and
# one concurrency group. Integration tests now run on PRs too — the 2026-06 lesson
# (Issue 144): integration was main-only, so a poll-task regression sat red for 9+
# days without ever blocking a PR.

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege (GitHub Actions 2026 security guidance): default the GITHUB_TOKEN
# to read-only for the whole workflow; no job here needs write. Escalate per-job only
# if a future job must (e.g. push a package).
permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # Pin ruff to match the .venv version locally so `ruff format --check`
      # cannot diverge again — see LEFT_OFF 2026-06-07 lesson (CI's unpinned
      # ruff started enforcing newer collapse rules than the local pin).
      - run: pip install ruff==0.15.15
      - run: ruff check .
      - run: ruff format --check .

  unit:
    name: Unit tests (pytest)
    runs-on: ubuntu-latest
    # conftest.py injects fake creds and DB/external APIs are overridden, but the
    # slowapi rate limiter talks to a real Redis (no in-memory fallback), so the
    # unit suite needs a Redis service. conftest defaults REDIS_URL to
    # redis://localhost:6379/0, which maps to the service below.
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install system deps (ffmpeg + libpq)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends ffmpeg libpq-dev gcc
      - name: Install Python deps
        run: pip install -r requirements.txt
      - name: Import smoke (fail fast on dep drift)
        # Catches transitive-dep drift before running the full suite — e.g. a
        # 2026-05-28 regression where unpinned starlette resolved to 1.x (incompatible
        # with FastAPI 0.115.x). pytest --collect-only imports every test module and
        # surfaces TypeError/ImportError in ~2s rather than 30s.
        run: pytest --collect-only -q
      - name: Run unit tests
        # pytest.ini already applies -m "not integration"
        run: pytest --tb=short -q

  integration:
    name: Integration tests (postgres + redis)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: creatorclip_test
          POSTGRES_USER: creatorclip
          POSTGRES_PASSWORD: ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U creatorclip -d creatorclip_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://creatorclip:ci_password@localhost:5432/creatorclip_test
      REDIS_URL: redis://localhost:6379/0
      # Fake values — config.py requires these present; no real API calls made in CI
      ANTHROPIC_API_KEY: sk-ant-ci-placeholder
      GOOGLE_OAUTH_CLIENT_ID: 000000000000-ci.apps.googleusercontent.com
      GOOGLE_OAUTH_CLIENT_SECRET: ci-secret
      OAUTH_REDIRECT_URI: http://localhost:8000/auth/callback
      TOKEN_ENCRYPTION_KEY: MDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDA=
      JWT_SECRET_KEY: ci-jwt-secret-key-not-used-in-tests
      ALLOWED_ORIGINS: http://localhost:8000
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install system deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends ffmpeg libpq-dev gcc
      - name: Install Python deps
        run: pip install -r requirements.txt
      - name: Run Alembic migrations
        run: alembic upgrade head
      - name: Run integration tests
        run: pytest -m integration --tb=short -q

  coverage:
    name: Coverage floor (pytest-cov ratchet)
    runs-on: ubuntu-latest
    # Mirrors the unit job: the slowapi limiter needs a real Redis.
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
        with:
          # Issue 269: fetch-depth 0 required for correct git diff computation
          # in the diff-cover gate. A shallow clone (depth 1) produces an empty
          # diff, making the patch-coverage gate a no-op.
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install system deps (ffmpeg + libpq)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends ffmpeg libpq-dev gcc
      - name: Install deps
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Run coverage gate
        # --require-coverage turns a skipped coverage run into a hard failure so
        # the floor is genuinely enforced in CI (unlike local runs).
        run: >-
          python3 .claude/skills/production-assessment/scripts/run_layer0.py
          --gates coverage --require-coverage
      - name: Run per-module coverage floors + diff/patch coverage gate (Issue 269)
        # Runs after coverage produces _coverage.xml. module_coverage checks per-module
        # floors for clip_engine/, preference/, crypto.py, limiter.py, auth.py.
        # diff_cover checks changed-line coverage vs origin/main (--fail-under=80).
        run: >-
          python3 .claude/skills/production-assessment/scripts/run_layer0.py
          --gates module_coverage,diff_cover

  migration-lint:
    # Issue 270: Squawk migration linter — detect unsafe DDL before it reaches prod.
    # Runs only when alembic/versions/*.py files change (dorny/paths-filter@v3).
    # Squawk rules enforced: ban-concurrent-index-creation-in-transaction,
    # constraint-missing-not-valid, disallowed-unique-constraint, etc.
    name: Migration lint (Squawk)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: creatorclip_squawk
          POSTGRES_USER: creatorclip
          POSTGRES_PASSWORD: squawk_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U creatorclip -d creatorclip_squawk"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://creatorclip:squawk_ci_password@localhost:5432/creatorclip_squawk
      DATABASE_MIGRATION_URL: postgresql+psycopg://creatorclip:squawk_ci_password@localhost:5432/creatorclip_squawk
      REDIS_URL: redis://localhost:6379/0
      ANTHROPIC_API_KEY: sk-ant-ci-placeholder
      GOOGLE_OAUTH_CLIENT_ID: 000000000000-ci.apps.googleusercontent.com
      GOOGLE_OAUTH_CLIENT_SECRET: ci-secret
      OAUTH_REDIRECT_URI: http://localhost:8000/auth/callback
      TOKEN_ENCRYPTION_KEY: MDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDA=
      JWT_SECRET_KEY: ci-jwt-secret-key-not-used-in-tests
      ALLOWED_ORIGINS: http://localhost:8000
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: filter
        name: Detect alembic/versions/ changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            migrations:
              - 'alembic/versions/*.py'
      - uses: actions/setup-python@v6
        if: steps.filter.outputs.migrations == 'true'
        with:
          python-version: "3.12"
          cache: pip
      - name: Install system deps (libpq)
        if: steps.filter.outputs.migrations == 'true'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends libpq-dev gcc
      - name: Install Python deps + squawk-cli
        if: steps.filter.outputs.migrations == 'true'
        run: |
          pip install -r requirements.txt
          npm install -g squawk-cli
      - name: Bootstrap schema to previous head
        if: steps.filter.outputs.migrations == 'true'
        run: alembic upgrade head
      - name: Lint changed migrations with Squawk
        if: steps.filter.outputs.migrations == 'true'
        run: |
          # For each changed migration file, render its SQL and lint with squawk.
          CHANGED=$(git diff --name-only origin/main...HEAD -- alembic/versions/*.py)
          if [ -z "$CHANGED" ]; then
            echo "No migration files changed vs origin/main — skipping squawk."
            exit 0
          fi
          FAIL=0
          for F in $CHANGED; do
            # Extract the revision ID from the filename (e.g. 0028_foo.py → 0028)
            REV=$(python3 -c "
          import re, sys
          m = re.search(r'([0-9a-f]+)_', sys.argv[1])
          print(m.group(1) if m else '')
          " "$F")
            if [ -z "$REV" ]; then
              echo "Cannot parse revision from $F — skipping."
              continue
            fi
            echo "=== Linting migration $REV ($F) ==="
            alembic upgrade "${REV}:+1" --sql 2>/dev/null | squawk || FAIL=1
          done
          exit $FAIL

  static-gates:
    name: Types + SAST + deps (mypy, bandit, pip-audit)
    runs-on: ubuntu-latest
    # No DB/Redis needed — these gates are static. Fast feedback (~1 min). All gating
    # logic lives in scripts/run_layer0.py so CI and a local `/assess` measure identically.
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Run static gates
        run: >-
          python3 .claude/skills/production-assessment/scripts/run_layer0.py
          --gates ruff,mypy,bandit,pip_audit,freshness

  frontend:
    name: Frontend (lint, test, build)
    runs-on: ubuntu-latest
    # The React + TS SPA (frontend/). Mirrors the local gates: eslint, vitest unit
    # tests (incl. the brief-parser XSS-safety assertion), and a production build.
    # The Docker image compiles the SPA in its own stage, but this job gives fast,
    # isolated feedback without spinning up Buildx.
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  eval:
    # Issue 265: clip-quality eval gate — required on every clip_engine/ or
    # tests/eval/ change. Runs the YAML scenario fixtures + two new guard tests
    # (count floor + skip-marker scan) to ensure the eval harness cannot be
    # silently hollowed out.
    #
    # WHY commit-status, not required job: a skipped GitHub Actions job reports
    # 'success', so if we made this job required-only-when-paths-changed, a PR
    # that doesn't touch clip_engine/ would report it as "passed" — a no-op gate.
    # The commit-status API always reports the real outcome (pending / success /
    # failure) regardless of skip state, so branch protection can require it.
    name: Clip eval gate (setup-before-peak)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write   # needed to post the commit status
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - id: filter
        name: Detect clip_engine/ or tests/eval/ changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            clip_engine:
              - 'clip_engine/**'
              - 'tests/eval/**'
              - 'tests/test_clip_engine.py'
      - uses: actions/setup-python@v6
        if: steps.filter.outputs.clip_engine == 'true'
        with:
          python-version: "3.12"
          cache: pip
      - name: Install system deps (ffmpeg + libpq)
        if: steps.filter.outputs.clip_engine == 'true'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends ffmpeg libpq-dev gcc
      - name: Install Python deps
        if: steps.filter.outputs.clip_engine == 'true'
        run: pip install -r requirements.txt
      - name: Run eval scenarios + guard tests
        if: steps.filter.outputs.clip_engine == 'true'
        run: pytest tests/test_clip_engine.py -k "eval_scenario or eval_scenario_count_floor or eval_scenario_no_unapproved_skip_markers" -v --tb=short
      - name: Post commit status (success — paths matched + tests passed)
        if: steps.filter.outputs.clip_engine == 'true' && success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              context: 'eval/clip-quality',
              description: 'Clip eval scenarios passed',
            });
      - name: Post commit status (failure)
        if: steps.filter.outputs.clip_engine == 'true' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'failure',
              context: 'eval/clip-quality',
              description: 'Clip eval scenarios FAILED — check setup-before-peak invariant',
            });
      - name: Post commit status (skipped — no clip_engine/ changes)
        if: steps.filter.outputs.clip_engine == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              context: 'eval/clip-quality',
              description: 'Skipped — no clip_engine/ or tests/eval/ changes',
            });

  playwright:
    # Issue 266: Playwright SPA smoke + a11y gate. Runs the existing
    # frontend/e2e/smoke.spec.ts and frontend/e2e/a11y.spec.ts against the
    # Vite dev server with the mocked backend (e2e/fixtures/mock-api.ts).
    # Chromium-only install keeps CI fast; other browsers are CI-unused.
    name: Playwright (smoke + a11y)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Install Playwright Chromium
        # --with-deps installs the OS-level Chromium deps in one step, matching the
        # official Playwright CI guidance. Chromium-only — Firefox/WebKit are not
        # needed for smoke+a11y and would add ~300MB to the CI cache.
        run: npx playwright install --with-deps chromium
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: playwright-chromium-
      - name: Run Playwright (smoke + a11y)
        # playwright.config.ts already has: forbidOnly: !!CI, retries: CI?1:0,
        # reuseExistingServer: !CI — all CI behavour is pre-configured.
        run: npm run test:e2e

  visual:
    # Issue 272: visual regression baselines on stable routes (login, pricing,
    # empty-dashboard). Non-gating initially (continue-on-error: true) until
    # baselines are committed from a Linux CI --update-snapshots run.
    # CRITICAL: Baselines must be generated on this ubuntu-latest runner —
    # local WSL2/macOS font anti-aliasing differs from Linux and causes false
    # positives. Update workflow: run with --update-snapshots, commit the
    # __snapshots__ PNGs in a dedicated PR.
    name: Visual regression (non-gating until baselines committed)
    runs-on: ubuntu-latest
    continue-on-error: true  # becomes gating once baselines are committed
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: playwright-chromium-
      - name: Run visual regression tests
        # Runs only tests tagged @visual. On first run (no baselines committed),
        # this will fail because there are no reference snapshots — that is expected.
        # Run with --update-snapshots once to generate baselines, then commit them.
        run: npx playwright test --grep "@visual"
      - name: Upload snapshot diffs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diffs-${{ github.sha }}
          path: frontend/e2e/.results/
          retention-days: 7

  detect-flakes:
    # Issue 268: flake DETECTION — non-gating, never a merge gate.
    # Runs the unit suite with --reruns 1 and surfaces any test that failed on
    # attempt 1 but passed on attempt 2 as a job-summary annotation. A flake
    # that surfaces here gets @pytest.mark.quarantine (excluded from gating run)
    # until the root cause is fixed. Blanket rerun-as-gate is EXPLICITLY PROHIBITED
    # (see docs/BRANCHING.md and docs/DECISIONS.md — Issue 268).
    name: Flake detection (non-gating)
    runs-on: ubuntu-latest
    continue-on-error: true  # NEVER gating — flake detection is informational only
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install system deps (ffmpeg + libpq)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends ffmpeg libpq-dev gcc
      - name: Install Python deps (including pytest-rerunfailures)
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Run flake detection (reruns=1, not quarantine, not integration)
        # --reruns 1 and --report-log surface tests that passed only on retry.
        # NEVER add --reruns to the gating unit job; this job alone uses reruns.
        run: |
          pytest -m "not integration and not quarantine" \
            --reruns 1 \
            --report-log=flake-report.jsonl \
            --tb=no -q || true
      - name: Surface flake candidates as job summary
        if: always()
        run: |
          python3 - <<'EOF'
          import json, pathlib, collections
          log = pathlib.Path("flake-report.jsonl")
          if not log.exists():
              print("No flake report found.")
              exit(0)
          # Build a map: nodeid → list of outcomes across attempts
          attempts: dict[str, list[str]] = collections.defaultdict(list)
          for line in log.read_text().splitlines():
              try:
                  ev = json.loads(line)
              except json.JSONDecodeError:
                  continue
              if ev.get("$report_type") == "TestReport" and ev.get("when") == "call":
                  attempts[ev["nodeid"]].append(ev.get("outcome", "unknown"))
          # A flake = failed on first attempt, passed on a later attempt
          flakes = [
              nid for nid, outcomes in attempts.items()
              if len(outcomes) >= 2 and outcomes[0] == "failed" and "passed" in outcomes[1:]
          ]
          summary_file = pathlib.Path(
              __import__("os").environ.get("GITHUB_STEP_SUMMARY", "/dev/null")
          )
          with summary_file.open("a") as fh:
              if flakes:
                  fh.write("## Flake candidates detected\n\n")
                  fh.write("These tests failed on attempt 1 and passed on attempt 2.\n")
                  fh.write("Add `@pytest.mark.quarantine` while the root cause is investigated.\n\n")
                  for nid in flakes:
                      fh.write(f"- `{nid}`\n")
                  print(f"FLAKE CANDIDATES ({len(flakes)}):")
                  for nid in flakes:
                      print(f"  {nid}")
              else:
                  fh.write("## Flake detection: no flakes found\n")
                  print("No flake candidates detected.")
          EOF

  docker-build:
    name: Docker build (smoke test)
    runs-on: ubuntu-latest
    # Verifies the image builds without a push — runs on every PR. Push to GHCR
    # happens only on merge to main (see docker-publish.yml).
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ghcr.io/${{ github.repository_owner }}/creatorclip:pr-${{ github.sha }}
