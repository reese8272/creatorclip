name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Pin ruff to match the .venv version locally so `ruff format --check`
      # cannot diverge again — see LEFT_OFF 2026-06-07 lesson (CI's unpinned
      # ruff started enforcing newer collapse rules than the local pin).
      - run: pip install ruff==0.15.15
      - run: ruff check .
      - run: ruff format --check .

  test:
    name: Unit tests (pytest)
    runs-on: ubuntu-latest
    # conftest.py injects fake creds and DB/external APIs are overridden, but the
    # slowapi rate limiter talks to a real Redis (no in-memory fallback), so the
    # unit suite needs a Redis service. conftest defaults REDIS_URL to
    # redis://localhost:6379/0, which maps to the service below.
    # Integration tests (marker: integration) run separately against a full stack.
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system deps (ffmpeg + libpq)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends ffmpeg libpq-dev gcc

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Import smoke (fail fast on dep drift)
        # Catches transitive-dep drift before running the full suite — e.g. a
        # 2026-05-28 regression where unpinned starlette resolved to 1.x (incompatible
        # with FastAPI 0.115.x). pytest --collect-only imports every test module and
        # surfaces TypeError/ImportError in ~2s rather than 30s.
        run: pytest --collect-only -q

      - name: Run unit tests
        # pytest.ini already applies -m "not integration"
        run: pytest --tb=short -q

  docker-build:
    name: Docker build (smoke test)
    runs-on: ubuntu-latest
    # Verifies the image builds successfully without a push — runs on every PR.
    # Push to GHCR happens only on merge to main (see docker-publish.yml).
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ghcr.io/${{ github.repository_owner }}/creatorclip:pr-${{ github.sha }}
