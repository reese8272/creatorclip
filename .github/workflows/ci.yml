name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  test:
    name: Unit tests (pytest)
    runs-on: ubuntu-latest
    # Unit tests are fully self-contained — conftest.py injects fake creds and
    # all external services are mocked via FastAPI dependency_overrides.
    # Integration tests (marker: integration) run separately against a real stack.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system deps (ffmpeg + libpq)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends ffmpeg libpq-dev gcc

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Run unit tests
        # pytest.ini already applies -m "not integration"
        run: pytest --tb=short -q

  docker-build:
    name: Docker build (smoke test)
    runs-on: ubuntu-latest
    # Verifies the image builds successfully without a push — runs on every PR.
    # Push to GHCR happens only on merge to main (see docker-publish.yml).
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ghcr.io/${{ github.repository_owner }}/creatorclip:pr-${{ github.sha }}
