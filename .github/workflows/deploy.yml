name: Deploy to production

on:
  workflow_run:
    workflows: ["Docker publish"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_staging:
        description: >-
          Break-glass: skip the staging-parity gate and deploy straight to prod
          (Issue 298). Use ONLY when staging infra itself is broken — never to
          bypass a failing migration or smoke test.
        type: boolean
        default: false

# Least privilege: deploy authenticates via SSH/GHCR secrets, not the
# GITHUB_TOKEN, so read-only is sufficient. (Issue 144)
permissions:
  contents: read

jobs:
  # ── Staging-parity gate (Issue 298) ──────────────────────────────────────
  # Motivating incident (2026-07-02 00:41): CI's fresh-DB bootstrap passed
  # while prod's DATA-BEARING DB failed the same migration. A fresh database
  # cannot catch migrations that break on existing rows, so the gate deploys
  # the EXACT image under test to the persistent staging stack (project
  # ccstage — its postgres volume is deliberately kept across runs) and runs
  # the in-container migration + critical-journey smoke BEFORE prod deploys.
  deploy-staging:
    name: Staging gate (data-bearing DB)
    runs-on: self-hosted
    # Same trigger condition as prod, minus the break-glass: skip_staging=true
    # skips this job entirely and the prod job's condition lets it through.
    if: >-
      (github.event.workflow_run.conclusion == 'success'
        || github.event_name == 'workflow_dispatch')
      && inputs.skip_staging != true
    # The GHCR pull token is an environment-scoped secret (same as prod deploy).
    environment: production
    defaults:
      run:
        working-directory: /opt/autoclip

    steps:
      - name: Checkout (for docker-compose.staging.yml)
        uses: actions/checkout@v6

      - name: Copy staging compose file to deploy dir
        run: cp ${{ github.workspace }}/docker-compose.staging.yml /opt/autoclip/docker-compose.staging.yml

      - name: Resolve exact image under test (sha- tag, never :latest)
        # docker-publish.yml tags every build `type=sha,prefix=sha-` → sha-<7-char
        # short SHA> (verified against GHCR: e.g. sha-9e92b66). :latest is
        # forbidden here — it can race a concurrent push and would defeat the
        # point of gating THIS build.
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          STAGING_IMAGE="ghcr.io/${{ github.repository_owner }}/creatorclip:sha-${HEAD_SHA:0:7}"
          echo "STAGING_IMAGE=${STAGING_IMAGE}" >> "$GITHUB_ENV"
          echo "Staging will run: ${STAGING_IMAGE}"

      - name: Authenticate with GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u reese8272 --password-stdin

      - name: Pull the image under test
        # The app image is pulled explicitly by digest-equivalent sha- tag so the
        # gate runs it exactly as published.
        run: docker pull "${STAGING_IMAGE}"

      - name: Bring up staging on the image under test
        # --no-build: never substitute a local rebuild for the pulled GHCR image.
        # --pull missing (compose's default, stated explicitly): the app image is
        # already present from the pull above and is used as-is; absent
        # third-party infra images (e.g. the digest-pinned PgBouncer sidecar) may
        # be fetched. `--pull never` failed the gate's FIRST run because the
        # pinned pgbouncer digest had never been pulled on this VM.
        run: |
          STAGING_IMAGE="${STAGING_IMAGE}" docker compose -p ccstage \
            -f docker-compose.staging.yml up -d --no-build --pull missing

      - name: Run migrations IN-CONTAINER against the data-bearing staging DB
        # exec (not `run --rm` on a host checkout): the container has the pinned
        # deps of the image under test — the exact combination prod will run.
        # The current==heads assertion mirrors scripts/deploy.sh (2026-06-24
        # outage guard: alembic once exited 0 while silently rolling back).
        run: |
          docker compose -p ccstage -f docker-compose.staging.yml \
            exec -T app alembic upgrade head
          CUR_REV=$(docker compose -p ccstage -f docker-compose.staging.yml \
            exec -T app alembic current 2>/dev/null | grep -oE '^[0-9a-f]+' | head -1)
          HEAD_REV=$(docker compose -p ccstage -f docker-compose.staging.yml \
            exec -T app alembic heads 2>/dev/null | grep -oE '^[0-9a-f]+' | head -1)
          if [ -z "$CUR_REV" ] || [ "$CUR_REV" != "$HEAD_REV" ]; then
            echo "Staging migration verification FAILED: current='${CUR_REV:-none}' head='${HEAD_REV:-none}'." >&2
            echo "The upgrade likely no-op'd or failed on existing data — prod deploy is blocked." >&2
            exit 1
          fi
          echo "Staging migrations confirmed at head ($CUR_REV)."

      - name: Seed staging fixtures (idempotent upsert)
        # tests/perf/seed_staging.py upserts on google_sub, preserving the fixed
        # creator UUID across runs — safe on the persistent volume, and it makes
        # the first run on a fresh volume self-sufficient.
        run: |
          docker compose -p ccstage -f docker-compose.staging.yml \
            exec -T app python tests/perf/seed_staging.py

      - name: Staging smoke (llm_harness --flow core)
        # The verified invocation from docs/STAGING_ACCESS.md: exec inside the
        # app container (baked-in httpx+jwt), CC_JWT_SECRET from the container's
        # own JWT_SECRET_KEY, CC_CREATOR_ID = the seeded staging creator.
        env:
          CC_CREATOR_ID: ${{ vars.CC_STAGING_CREATOR_ID || '00000000-1111-2222-3333-444444444444' }}
        run: |
          echo "Waiting for staging /health..."
          STATUS=""
          for i in 1 2 3 4 5; do
            BODY=$(docker compose -p ccstage -f docker-compose.staging.yml exec -T app \
              python3 -c "import urllib.request; r=urllib.request.urlopen('http://localhost:8000/health',timeout=10); print(r.read().decode())" \
              2>/dev/null || true)
            echo "Attempt $i: $BODY"
            STATUS=$(echo "$BODY" | python3 -c "import sys,json; d=json.loads(sys.stdin.read()); print(d.get('status',''))" 2>/dev/null || true)
            [ "$STATUS" = "ok" ] && break
            [ $i -lt 5 ] && sleep 10
          done
          if [ "$STATUS" != "ok" ]; then
            echo "Staging /health FAILED after 5 attempts — prod deploy is blocked."
            exit 1
          fi
          echo "Running staging critical journey (llm_harness --flow core)..."
          docker compose -p ccstage -f docker-compose.staging.yml exec -T \
            -e CC_CREATOR_ID="${CC_CREATOR_ID}" \
            app sh -c 'CC_BASE_URL=http://localhost:8000 CC_JWT_SECRET="$JWT_SECRET_KEY" python scripts/llm_harness.py --flow core'
          echo "Staging gate passed."

      - name: Staging logs (on failure)
        if: failure()
        run: docker compose -p ccstage -f docker-compose.staging.yml logs --tail 200 app worker || true

      - name: Stop staging app/worker (keep the postgres volume — its persistence IS the gate)
        # stop, not down: staging_postgres_data must survive so the next run
        # migrates a DATA-BEARING database, which is the whole point (Issue 298).
        if: always()
        run: docker compose -p ccstage -f docker-compose.staging.yml stop app worker || true

  deploy:
    name: Deploy → autoclip.studio
    # Self-hosted runner on 147.182.136.107 — no GitHub-hosted minutes consumed.
    # Install the runner once with scripts/setup-runner.sh.
    # Falls back to manual deploy via scripts/deploy.sh when the runner is offline.
    runs-on: self-hosted
    needs: deploy-staging
    # !cancelled() is required: without a status-check function GitHub injects an
    # implicit success(), which would skip prod even on the skip_staging=true
    # break-glass path (a skipped needs-job fails success()). The gate condition
    # itself: staging must have PASSED, or the operator explicitly broke glass.
    # A workflow_run trigger with a failed Docker publish never reaches here
    # (deploy-staging is skipped and inputs.skip_staging is unset).
    if: ${{ !cancelled() && (needs.deploy-staging.result == 'success' || inputs.skip_staging == true) }}
    environment: production
    defaults:
      run:
        working-directory: /opt/autoclip

    steps:
      - name: Checkout (for docker-compose.prod.yml)
        uses: actions/checkout@v6

      - name: Copy compose file to deploy dir
        run: cp ${{ github.workspace }}/docker-compose.prod.yml /opt/autoclip/docker-compose.prod.yml

      - name: Sync secrets to .env
        # Secrets are passed via env: (the GitHub-recommended pattern) rather than
        # interpolated into the script — avoids shell-injection / sed-delimiter issues
        # with special characters and keeps values out of the rendered command.
        # Each sync is GUARDED: a secret that is unset in GitHub is left as-is on the
        # VM (we never blank an existing prod value). Infra secrets (DATABASE_URL,
        # REDIS_URL, JWT_SECRET_KEY, TOKEN_ENCRYPTION_KEY, OAuth, …) remain VM-managed
        # and are intentionally not listed here.
        #
        # R2 object storage IS synced here (added after a prod upload silently
        # FAILED): app and worker are separate containers with no shared media
        # volume, so the pipeline only works when STORAGE_BACKEND=r2 and the R2
        # creds resolve. Leaving these to manual VM `.env` edits meant a fresh VM
        # or a key rotation could route every upload onto the app container's local
        # disk, where the worker can't read it. STORAGE_BACKEND is pinned to r2
        # below (authoritative — local is a broken topology in prod, enforced by
        # the config validator).
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
          YOUTUBE_API_V3_KEY: ${{ secrets.YOUTUBE_API_V3_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          # Observability (Issue 326) — guarded like the rest. Until these GitHub
          # secrets are set, the sync is a no-op and OTel/Sentry stay dormant
          # (init_otel returns immediately on an empty OTEL_EXPORTER_OTLP_ENDPOINT;
          # the Sentry SDK no-ops on an empty SENTRY_DSN). The HEADERS value carries
          # the Grafana Cloud auth token — secret, never logged. The four non-secret
          # OTEL_* tunables (service name, sample rate, metrics/logs toggles) keep
          # their config.py defaults and are intentionally not synced here.
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
          OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
          # Stamp the deployed commit so Sentry/OTel attribute events to this build.
          # head_sha is the exact commit "Docker publish" built; fall back to the
          # ref SHA on a manual workflow_dispatch. Non-secret — rewritten every deploy.
          IMAGE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          sync_secret() {
            key="$1"; val="$2"
            if [ -z "$val" ]; then echo "skip $key (no GitHub secret set)"; return; fi
            if grep -q "^${key}=" .env; then
              # exact-key match on the first '='; rebuild the value to tolerate any chars
              awk -v k="$key" -v v="$val" 'BEGIN{FS="="} $1==k{print k"="v; next} {print}' .env > .env.tmp \
                && mv .env.tmp .env
            else
              printf '%s=%s\n' "$key" "$val" >> .env
            fi
            echo "synced $key"
          }
          sync_secret STRIPE_SECRET_KEY  "$STRIPE_SECRET_KEY"
          sync_secret ANTHROPIC_API_KEY  "$ANTHROPIC_API_KEY"
          sync_secret DEEPGRAM_API_KEY   "$DEEPGRAM_API_KEY"
          sync_secret VOYAGE_API_KEY     "$VOYAGE_API_KEY"
          sync_secret YOUTUBE_API_V3_KEY "$YOUTUBE_API_V3_KEY"
          sync_secret R2_ACCOUNT_ID        "$R2_ACCOUNT_ID"
          sync_secret R2_ACCESS_KEY_ID     "$R2_ACCESS_KEY_ID"
          sync_secret R2_SECRET_ACCESS_KEY "$R2_SECRET_ACCESS_KEY"
          sync_secret R2_BUCKET            "$R2_BUCKET"
          sync_secret SENTRY_DSN                  "$SENTRY_DSN"
          sync_secret OTEL_EXPORTER_OTLP_ENDPOINT "$OTEL_EXPORTER_OTLP_ENDPOINT"
          sync_secret OTEL_EXPORTER_OTLP_HEADERS  "$OTEL_EXPORTER_OTLP_HEADERS"
          # IMAGE_SHA always has a value (commit SHA), so this stamps every deploy.
          sync_secret IMAGE_SHA                   "$IMAGE_SHA"
          # Pin STORAGE_BACKEND=r2 AUTHORITATIVELY (not a guarded default): with the
          # multi-container prod topology, local-disk storage is a broken backend —
          # the worker can't read the app container's disk. Rewrite any existing
          # value so an operator can't accidentally leave it at the ./local default.
          if grep -q '^STORAGE_BACKEND=' .env; then
            awk 'BEGIN{FS="="} $1=="STORAGE_BACKEND"{print "STORAGE_BACKEND=r2"; next} {print}' .env > .env.tmp \
              && mv .env.tmp .env
          else
            echo 'STORAGE_BACKEND=r2' >> .env
          fi
          echo "pinned STORAGE_BACKEND=r2"
          # Non-secret operational default: keep prod at INFO (verbose + safe; DEBUG
          # can leak request headers via httpx). Only add if absent — never clobber
          # an operator's explicit VM override.
          grep -q '^LOG_LEVEL=' .env || echo 'LOG_LEVEL=INFO' >> .env

      - name: Authenticate with GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u reese8272 --password-stdin

      - name: Capture pre-pull image for rollback (Issue 271)
        # Record the digest of the CURRENT running image before pulling the new one,
        # so we have an immutable rollback target if the smoke test fails.
        # Falls back to empty string on first-ever deploy (no container running yet).
        run: |
          CID=$(docker compose -f docker-compose.prod.yml ps -q app 2>/dev/null || true)
          PREV_IMAGE=""
          if [ -n "$CID" ]; then
            PREV_IMAGE=$(docker inspect --format='{{index .RepoDigests 0}}' "$CID" 2>/dev/null || true)
          fi
          echo "PREV_IMAGE=${PREV_IMAGE}" >> "$GITHUB_ENV"
          echo "Previous image: ${PREV_IMAGE:-<none — first deploy>}"

      - name: Pull latest image
        run: docker compose -f docker-compose.prod.yml pull

      - name: Preflight check
        run: docker compose -f docker-compose.prod.yml run --rm app python scripts/doctor.py

      - name: Pre-migration safety dump (Issue 257)
        # Take an encrypted pg_dump BEFORE alembic so a bad/destructive migration has
        # an undo (the billing ledgers + trained-taste tables are irreplaceable).
        # Reuses scripts/backup_pg.sh (Issue 256) with a separate predeploy/ prefix.
        # GATE: if backups ARE configured (BACKUP_R2_BUCKET set) a dump failure aborts
        # the deploy before migrating; if backups are NOT yet configured (Issue 256 not
        # activated) we skip with a loud warning rather than brick every deploy.
        run: |
          if grep -qE '^BACKUP_R2_BUCKET=.+' .env 2>/dev/null; then
            echo "Taking pre-migration safety dump (predeploy/)..."
            BACKUP_PREFIX=predeploy/ \
            COMPOSE_FILE=/opt/autoclip/docker-compose.prod.yml \
            ENV_FILE=/opt/autoclip/.env \
            bash "${{ github.workspace }}/scripts/backup_pg.sh"
          else
            echo "::warning::No BACKUP_R2_BUCKET configured — skipping pre-migration dump (Issue 256 not yet activated). Migrating WITHOUT a safety dump."
          fi

      - name: Run migrations
        run: docker compose -f docker-compose.prod.yml run --rm app alembic upgrade head

      - name: Roll out
        run: docker compose -f docker-compose.prod.yml up -d --remove-orphans

      - name: Smoke test (auto-rollback on failure — Issue 271, Issue 295)
        # Phase 1: /health liveness gate (fast, no auth required).
        # Phase 2: critical journey — llm_harness --flow core (auth_me, videos_list,
        #   dna, insights, billing_balance, videos_envelope_shape). On failure in
        #   either phase: auto-rollback to PREV_IMAGE if available, then exit 1
        #   so alerting fires (rollback is a safety net, not a success signal).
        #
        # Required secrets/env (set in production .env or as GitHub Actions secrets):
        #   CC_BASE_URL    — defaults to http://localhost:8000
        #   CC_JWT_SECRET  — the running app's JWT_SECRET_KEY
        #   CC_CREATOR_ID  — a seeded test-creator UUID (from tests/perf/seed_staging.py)
        env:
          CC_BASE_URL: ${{ vars.CC_BASE_URL || 'http://localhost:8000' }}
          CC_JWT_SECRET: ${{ secrets.CC_JWT_SECRET }}
          CC_CREATOR_ID: ${{ vars.CC_CREATOR_ID }}
        run: |
          _rollback_and_fail() {
            echo "Auto-rolling back to previous image: ${PREV_IMAGE}"
            if [ -n "${PREV_IMAGE}" ]; then
              docker pull "${PREV_IMAGE}" || true
              # PREV_IMAGE is a repo DIGEST ref (ghcr.io/...@sha256:...) which can't
              # sit in the compose tag slot, so re-tag it locally as :rollback and
              # select it via the ${IMAGE_TAG:-latest} interpolation now present in
              # docker-compose.prod.yml. (Issue 271 fix, folded into Issue 298 —
              # previously IMAGE_TAG was never interpolated and "rollback"
              # relaunched the broken :latest.)
              docker tag "${PREV_IMAGE}" ghcr.io/reese8272/creatorclip:rollback || true
              docker compose -f docker-compose.prod.yml down --timeout 30 || true
              IMAGE_TAG=rollback docker compose -f docker-compose.prod.yml up -d || true
              echo "Rollback complete. Verify with: curl http://localhost:8000/health"
            else
              echo "No previous image captured (first deploy?) — manual recovery required."
            fi
            exit 1
          }

          # ── Phase 1: /health liveness ─────────────────────────────────────
          STATUS=""
          for i in 1 2 3 4 5; do
            BODY=$(docker compose -f docker-compose.prod.yml exec -T app \
              python3 -c "import urllib.request,json; r=urllib.request.urlopen('http://localhost:8000/health',timeout=10); print(r.read().decode())" \
              2>/dev/null || true)
            echo "Attempt $i: $BODY"
            STATUS=$(echo "$BODY" | python3 -c "import sys,json; d=json.loads(sys.stdin.read()); print(d.get('status',''))" 2>/dev/null || true)
            if [ "$STATUS" = "ok" ]; then
              echo "Deploy healthy (health): $BODY"
              break
            fi
            [ $i -lt 5 ] && sleep 10
          done
          if [ "$STATUS" != "ok" ]; then
            echo "Smoke test /health FAILED after 5 attempts."
            _rollback_and_fail
          fi

          # ── Phase 2: critical journey (Issue 295) ─────────────────────────
          # llm_harness --flow core: health + auth_me + videos_list + dna +
          # insights + billing_balance + videos_envelope_shape.
          # Exits non-zero on any REQUIRED step failure.
          # CC_JWT_SECRET and CC_CREATOR_ID must be set (see env block above).
          if [ -z "${CC_JWT_SECRET:-}" ]; then
            echo "WARNING: CC_JWT_SECRET not set — skipping critical journey smoke."
            echo "Set the CC_JWT_SECRET secret and CC_CREATOR_ID variable in GitHub Actions."
          else
            echo "Running critical journey smoke (llm_harness --flow core)..."
            docker compose -f docker-compose.prod.yml exec -T \
              -e CC_BASE_URL="${CC_BASE_URL}" \
              -e CC_JWT_SECRET="${CC_JWT_SECRET}" \
              -e CC_CREATOR_ID="${CC_CREATOR_ID}" \
              app python3 scripts/llm_harness.py --flow core \
              || { echo "Critical journey smoke FAILED."; _rollback_and_fail; }
            echo "Critical journey smoke passed."
          fi

      - name: Clean up old images (after successful smoke test — Issue 271)
        # Moved AFTER the smoke test so the previous image is available for rollback
        # during the smoke window. Only runs on successful deploys; failures exit
        # before this step, preserving the rollback target.
        run: docker image prune -f
