name: Deploy to production

on:
  workflow_run:
    workflows: ["Docker publish"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

# Least privilege: deploy authenticates via SSH/GHCR secrets, not the
# GITHUB_TOKEN, so read-only is sufficient. (Issue 144)
permissions:
  contents: read

jobs:
  deploy:
    name: Deploy → autoclip.studio
    # Self-hosted runner on 147.182.136.107 — no GitHub-hosted minutes consumed.
    # Install the runner once with scripts/setup-runner.sh.
    # Falls back to manual deploy via scripts/deploy.sh when the runner is offline.
    runs-on: self-hosted
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    environment: production
    defaults:
      run:
        working-directory: /opt/autoclip

    steps:
      - name: Checkout (for docker-compose.prod.yml)
        uses: actions/checkout@v6

      - name: Copy compose file to deploy dir
        run: cp ${{ github.workspace }}/docker-compose.prod.yml /opt/autoclip/docker-compose.prod.yml

      - name: Sync secrets to .env
        run: |
          grep -q '^STRIPE_SECRET_KEY=' .env \
            && sed -i "s|^STRIPE_SECRET_KEY=.*|STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}|" .env \
            || echo "STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}" >> .env

      - name: Authenticate with GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u reese8272 --password-stdin

      - name: Capture pre-pull image for rollback (Issue 271)
        # Record the digest of the CURRENT running image before pulling the new one,
        # so we have an immutable rollback target if the smoke test fails.
        # Falls back to empty string on first-ever deploy (no container running yet).
        run: |
          PREV_IMAGE=$(docker inspect \
            --format='{{index .RepoDigests 0}}' \
            $(docker compose -f docker-compose.prod.yml ps -q app 2>/dev/null || true) \
            2>/dev/null || true)
          echo "PREV_IMAGE=${PREV_IMAGE}" >> "$GITHUB_ENV"
          echo "Previous image: ${PREV_IMAGE:-<none — first deploy>}"

      - name: Pull latest image
        run: docker compose -f docker-compose.prod.yml pull

      - name: Preflight check
        run: docker compose -f docker-compose.prod.yml run --rm app python scripts/doctor.py

      - name: Run migrations
        run: docker compose -f docker-compose.prod.yml run --rm app alembic upgrade head

      - name: Roll out
        run: docker compose -f docker-compose.prod.yml up -d --remove-orphans

      - name: Smoke test (auto-rollback on failure — Issue 271)
        # On failure: if a PREV_IMAGE was captured, re-pull and restart on the
        # previous image before exiting non-zero so alerting fires. If no previous
        # image exists (first deploy), skip rollback. Image pruning is deferred until
        # AFTER this step so the rollback target is available during the smoke window.
        run: |
          STATUS=""
          for i in 1 2 3 4 5; do
            BODY=$(docker compose -f docker-compose.prod.yml exec -T app \
              python3 -c "import urllib.request,json; r=urllib.request.urlopen('http://localhost:8000/health',timeout=10); print(r.read().decode())" \
              2>/dev/null || true)
            echo "Attempt $i: $BODY"
            STATUS=$(echo "$BODY" | python3 -c "import sys,json; d=json.loads(sys.stdin.read()); print(d.get('status',''))" 2>/dev/null || true)
            if [ "$STATUS" = "ok" ]; then
              echo "Deploy healthy: $BODY"
              break
            fi
            [ $i -lt 5 ] && sleep 10
          done
          if [ "$STATUS" != "ok" ]; then
            echo "Smoke test FAILED after 5 attempts."
            if [ -n "${PREV_IMAGE}" ]; then
              echo "Auto-rolling back to previous image: ${PREV_IMAGE}"
              docker pull "${PREV_IMAGE}" || true
              # Override the image tag in the compose file temporarily and restart.
              docker compose -f docker-compose.prod.yml down --timeout 30 || true
              IMAGE_TAG="${PREV_IMAGE}" docker compose -f docker-compose.prod.yml up -d || true
              echo "Rollback complete. Verify with: curl http://localhost:8000/health"
            else
              echo "No previous image captured (first deploy?) — manual recovery required."
            fi
            exit 1
          fi

      - name: Clean up old images (after successful smoke test — Issue 271)
        # Moved AFTER the smoke test so the previous image is available for rollback
        # during the smoke window. Only runs on successful deploys; failures exit
        # before this step, preserving the rollback target.
        run: docker image prune -f
