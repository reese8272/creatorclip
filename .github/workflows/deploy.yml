name: Deploy to production

on:
  workflow_run:
    workflows: ["Docker publish"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy → autoclip.studio
    # Self-hosted runner on 147.182.136.107 — no GitHub-hosted minutes consumed.
    # Install the runner once with scripts/setup-runner.sh.
    # Falls back to manual deploy via scripts/deploy.sh when the runner is offline.
    runs-on: self-hosted
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    environment: production
    defaults:
      run:
        working-directory: /opt/autoclip

    steps:
      - name: Checkout (for docker-compose.prod.yml)
        uses: actions/checkout@v4

      - name: Copy compose file to deploy dir
        run: cp ${{ github.workspace }}/docker-compose.prod.yml /opt/autoclip/docker-compose.prod.yml

      - name: Sync secrets to .env
        run: |
          grep -q '^STRIPE_SECRET_KEY=' .env \
            && sed -i "s|^STRIPE_SECRET_KEY=.*|STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}|" .env \
            || echo "STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}" >> .env

      - name: Authenticate with GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u reese8272 --password-stdin

      - name: Pull latest image
        run: docker compose -f docker-compose.prod.yml pull

      - name: Preflight check
        run: docker compose -f docker-compose.prod.yml run --rm app python scripts/doctor.py

      - name: Run migrations
        run: docker compose -f docker-compose.prod.yml run --rm app alembic upgrade head

      - name: Roll out
        run: docker compose -f docker-compose.prod.yml up -d --remove-orphans

      - name: Clean up old images
        run: docker image prune -f

      - name: Smoke test
        run: |
          STATUS=""
          for i in 1 2 3 4 5; do
            BODY=$(docker compose -f docker-compose.prod.yml exec -T app \
              python3 -c "import urllib.request,json; r=urllib.request.urlopen('http://localhost:8000/health',timeout=10); print(r.read().decode())" \
              2>/dev/null || true)
            echo "Attempt $i: $BODY"
            STATUS=$(echo "$BODY" | python3 -c "import sys,json; d=json.loads(sys.stdin.read()); print(d.get('status',''))" 2>/dev/null || true)
            if [ "$STATUS" = "ok" ]; then
              echo "Deploy healthy: $BODY"
              break
            fi
            [ $i -lt 5 ] && sleep 10
          done
          [ "$STATUS" = "ok" ] || { echo "Smoke test failed after 5 attempts"; exit 1; }
