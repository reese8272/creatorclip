name: Deploy to production

on:
  workflow_run:
    workflows: ["Docker publish"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: SSH deploy → autoclip.studio
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    environment: production

    steps:
      - name: Checkout (for docker-compose.prod.yml)
        uses: actions/checkout@v4

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: docker-compose.prod.yml
          target: /opt/autoclip

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd /opt/autoclip

            # Authenticate with GHCR so we can pull the private image
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest images
            docker compose -f docker-compose.prod.yml pull

            # Run DB migrations before cutting over traffic
            docker compose -f docker-compose.prod.yml run --rm app \
              alembic upgrade head

            # Roll out — zero-downtime for stateless app + worker
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Clean up old images to save disk space
            docker image prune -f

      - name: Smoke test
        run: |
          sleep 10
          curl -sf --max-time 15 https://agenticlip.studio/health | \
            python3 -c "
            import sys, json
            d = json.load(sys.stdin)
            assert d.get('status') == 'ok', f'Health check failed: {d}'
            print('Deploy healthy:', d)
            "
