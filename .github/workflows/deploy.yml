name: Deploy to production

on:
  workflow_run:
    workflows: ["Docker publish"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: SSH deploy → autoclip.studio
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    environment: production

    steps:
      - name: Checkout (for docker-compose.prod.yml)
        uses: actions/checkout@v4

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: docker-compose.prod.yml
          target: /opt/autoclip

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd /opt/autoclip

            # Sync secrets from GitHub → server .env
            grep -q '^STRIPE_SECRET_KEY=' .env \
              && sed -i "s|^STRIPE_SECRET_KEY=.*|STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}|" .env \
              || echo "STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}" >> .env

            # Authenticate with GHCR so we can pull the private image
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u reese8272 --password-stdin

            # Pull latest images
            docker compose -f docker-compose.prod.yml pull

            # Preflight: fail the deploy BEFORE migrating or cutting over if any
            # required secret is missing/invalid or Postgres/Redis is unreachable.
            # Output is redacted (no secret values printed). See docs/SECRETS.md.
            docker compose -f docker-compose.prod.yml run --rm app \
              python scripts/doctor.py

            # Run DB migrations before cutting over traffic
            docker compose -f docker-compose.prod.yml run --rm app \
              alembic upgrade head

            # Roll out — zero-downtime for stateless app + worker
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Clean up old images to save disk space
            docker image prune -f

            # Smoke test — hit the app container directly on localhost to bypass
            # Cloudflare bot protection (GitHub Actions IPs trigger the challenge).
            echo "Running smoke test..."
            for i in 1 2 3 4 5; do
              BODY=$(curl -s --max-time 10 http://localhost:8000/health || true)
              HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 http://localhost:8000/health || echo "000")
              echo "Attempt $i: HTTP $HTTP — $BODY"
              if [ "$HTTP" = "200" ]; then
                echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d.get('status')=='ok', f'Health check failed: {d}'; print('Deploy healthy:', d)"
                break
              fi
              [ $i -lt 5 ] && sleep 10
            done
            [ "$HTTP" = "200" ] || { echo "Smoke test failed after 5 attempts"; exit 1; }
