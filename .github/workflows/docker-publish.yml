name: Docker publish

on:
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  push:
    name: Build & push to GHCR
    # Self-hosted runner on 147.182.136.107 — no GitHub-hosted minutes consumed.
    # Pairs with `deploy.yml` (also self-hosted). The runner is installed via
    # scripts/setup-runner.sh; if it's not yet installed, this job queues until
    # it is — use `scripts/deploy.sh` as the manual fallback. Decision: Issue
    # 101 (2026-05-31) — eliminate GH-hosted billing as a deploy blocker.
    runs-on: self-hosted
    permissions:
      contents: write   # Issue 297: needs write to create Git tags + GitHub Releases
      packages: write

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/creatorclip
          tags: |
            # Branch push → latest
            type=raw,value=latest,enable={{is_default_branch}}
            # Commit SHA (short)
            type=sha,prefix=sha-
            # Semver tags from releases (v1.2.3 → 1.2.3, 1.2, 1)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # The DigitalOcean droplet is x86_64. Building arm64 too doubled build
          # time for an architecture nothing runs — amd64 only.
          platforms: linux/amd64
          # Cache-busting version for /static/*.css and /static/*.js. The
          # main.py StaticCacheBustMiddleware appends ?v=$GIT_SHA to every
          # static reference in served HTML, so each deploy invalidates the
          # Cloudflare CDN automatically. Short SHA = stable across rebuilds
          # of the same commit, fresh on every push.
          build-args: |
            GIT_SHA=sha-${{ github.sha }}

      # Issue 297: Auto-create a CalVer Git tag + GitHub Release on every push to
      # main. This fires the `type=semver` rule already present in docker/metadata-
      # action above, so the Docker image automatically carries the CalVer tag.
      # The tag is idempotent: if the same version already exists (same-month hotfix
      # with patch=0), the step will fail with "already exists" — bump the patch in
      # pyproject.toml [project].version before merging a second release in a month.
      - name: Read CalVer from pyproject.toml
        id: calver
        run: |
          VERSION=$(python3 -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              print(tomllib.load(f)['project']['version'])
          ")
          echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "CalVer tag: v${VERSION}"

      - name: Create CalVer Git tag + GitHub Release
        # Only fires on push to main (not on release: triggers — those already have a tag).
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.calver.outputs.version }}"
          # Create the annotated Git tag (idempotent-ish: exit 0 if already exists).
          git config user.email "actions@github.com"
          git config user.name "github-actions[bot]"
          git tag -a "${TAG}" -m "Release ${TAG}" "${{ github.sha }}" 2>/dev/null \
            || echo "Tag ${TAG} already exists — skipping tag creation."
          git push origin "${TAG}" 2>/dev/null \
            || echo "Tag ${TAG} already on remote — skipping push."
          # Create a GitHub Release so the semver type=semver metadata-action
          # rule fires on the next docker-publish triggered by the release event,
          # and the Docker image carries the CalVer tag automatically.
          gh release create "${TAG}" \
            --title "Release ${TAG}" \
            --notes "Automated CalVer release for commit ${{ github.sha }}." \
            --target "${{ github.sha }}" \
            2>/dev/null || echo "Release ${TAG} already exists — skipping."
