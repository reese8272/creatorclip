name: Docker publish

on:
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  push:
    name: Build & push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/creatorclip
          tags: |
            # Branch push → latest
            type=raw,value=latest,enable={{is_default_branch}}
            # Commit SHA (short)
            type=sha,prefix=sha-
            # Semver tags from releases (v1.2.3 → 1.2.3, 1.2, 1)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # The DigitalOcean droplet is x86_64. Building arm64 too doubled build
          # time for an architecture nothing runs — amd64 only.
          platforms: linux/amd64
