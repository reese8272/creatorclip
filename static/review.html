<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoClip — Review</title>
  <link rel="stylesheet" href="/static/_design-tokens.css">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="/static/auth.js"></script>
  <script src="/static/activeTasks.js" defer></script>
  <script src="/static/activityPanel.js" defer></script>
  <style>
    /* Issue 99 Phase B — review.html retrofit (clip player + trim). */

    .player-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-4);
      padding: var(--space-6) var(--space-4);
      max-width: 480px;
      margin: 0 auto;
    }

    video {
      max-width: 360px;
      width: 100%;
      aspect-ratio: 9/16;
      background: #000;
      border-radius: var(--radius);
      border: 1px solid var(--color-border);
    }

    .clip-meta {
      font-family: var(--font-mono);
      font-feature-settings: 'tnum';
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      text-align: center;
    }
    .clip-principle {
      font-size: var(--text-xs);
      color: var(--color-accent);
      font-style: italic;
      text-align: center;
    }

    /* Trim handles */
    .trim-section { width: 100%; max-width: 360px; }
    .trim-section label {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      display: block;
      margin-bottom: var(--space-1);
    }
    .trim-row {
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }
    input[type=range] { flex: 1; accent-color: var(--color-accent); background: transparent; border: none; padding: 0; }
    input[type=range]:focus { box-shadow: none; outline: 2px solid var(--color-accent-soft); outline-offset: 4px; }
    .trim-val {
      font-family: var(--font-mono);
      font-feature-settings: 'tnum';
      font-size: var(--text-xs);
      color: var(--color-text);
      width: 48px;
      text-align: right;
    }

    /* Action buttons */
    .review-actions {
      display: flex;
      gap: var(--space-2);
      flex-wrap: wrap;
      justify-content: center;
    }
    .review-actions .btn { min-width: 92px; }
    .btn-up   { background: var(--color-success); color: #000; }
    .btn-up:hover   { background: var(--color-success); opacity: 0.88; }
    .btn-down { background: var(--color-danger); color: #fff; }
    .btn-down:hover { background: var(--color-danger); opacity: 0.88; }
    .btn-skip { background: var(--color-border-strong); color: var(--color-text); }
    .btn-skip:hover { background: var(--color-elevated); }
    .btn-trim { background: var(--color-accent); color: #fff; }
    .btn-trim:hover { background: var(--color-accent-hover); }

    .next-wrap { text-align: center; padding: var(--space-2) 0; }
    .btn-next {
      background: transparent;
      border: 1px solid var(--color-border-strong);
      color: var(--color-text-muted);
      font-size: var(--text-xs);
    }
    .btn-next:hover { color: var(--color-text); border-color: var(--color-accent); }

    #feedback-flash {
      text-align: center;
      font-size: var(--text-xs);
      color: var(--color-success);
      min-height: 18px;
      padding: var(--space-1);
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a class="nav-brand" href="/">AutoClip</a>
    <div class="nav-links">
      <a href="/">Dashboard</a>
      <a href="/static/review.html" class="active">Review</a>
      <a href="/static/insights.html">Insights</a>
      <a href="/static/profile.html">Profile</a>
      <a href="/static/pricing.html">Pricing</a>
    </div>
    <span class="nav-spacer"></span>
    <a href="#" style="font-size:var(--text-xs);color:var(--color-text-muted)" onclick="logout()">Logout</a>
  </nav>

  <div class="disclaimer">
    AutoClip predicts fit with your style and audience — it does not promise virality.
    All scores are estimates grounded in your own channel data.
  </div>

  <div class="player-wrap">
    <video id="clip-player" controls playsinline></video>

    <div class="clip-meta" id="clip-meta">Loading clip…</div>
    <div class="clip-principle" id="clip-principle"></div>

    <div class="trim-section">
      <label>Trim start</label>
      <div class="trim-row">
        <input type="range" id="trim-start" min="0" max="100" step="0.1" value="0">
        <span class="trim-val" id="trim-start-val">0.0s</span>
      </div>
      <label style="margin-top:var(--space-2)">Trim end</label>
      <div class="trim-row">
        <input type="range" id="trim-end" min="0" max="100" step="0.1" value="100">
        <span class="trim-val" id="trim-end-val">—</span>
      </div>
    </div>

    <div id="feedback-flash"></div>

    <div class="review-actions">
      <button class="btn btn-up"   onclick="sendFeedback('upvote')">👍 Keep</button>
      <button class="btn btn-down" onclick="sendFeedback('downvote')">👎 Drop</button>
      <button class="btn btn-skip" onclick="sendFeedback('skip')">Skip</button>
      <button class="btn btn-trim" onclick="sendFeedback('trim')">✂ Trim</button>
    </div>

    <div class="next-wrap">
      <button class="btn btn-next" onclick="loadNext()">Next clip →</button>
    </div>
  </div>

  <script>
    let clips = [];
    let currentIndex = 0;
    let currentClip = null;

    const player    = document.getElementById('clip-player');
    const metaEl    = document.getElementById('clip-meta');
    const princEl   = document.getElementById('clip-principle');
    const trimStart = document.getElementById('trim-start');
    const trimEnd   = document.getElementById('trim-end');
    const startVal  = document.getElementById('trim-start-val');
    const endVal    = document.getElementById('trim-end-val');
    const flash     = document.getElementById('feedback-flash');

    async function logout() {
      await fetch('/auth/logout', { method: 'POST', credentials: 'include' });
      window.location = '/auth/login';
    }

    document.addEventListener('auth:ready', async () => {
      const params = new URLSearchParams(window.location.search);
      const videoId = params.get('video_id');
      if (!videoId) {
        metaEl.textContent = 'No video selected — go to Dashboard to pick a video.';
        return;
      }
      const resp = await fetch(`/videos/${videoId}/clips`, { credentials: 'include' });
      if (!resp.ok) {
        metaEl.textContent = 'Could not load clips for this video.';
        return;
      }
      const data = await resp.json();
      clips = data.clips || [];
      if (clips.length) {
        loadClip(clips[0]);
      } else {
        metaEl.textContent = 'No clips yet — generate them from the Dashboard.';
      }
    });

    function loadClip(clip) {
      currentClip = clip;
      if (clip.render_uri) {
        player.src = clip.render_uri;
        player.load();
        player.play().catch(() => {});
      } else {
        player.src = '';
        metaEl.textContent += ' (not yet rendered)';
      }
      const dur = (clip.end_s - (clip.setup_start_s ?? clip.start_s)).toFixed(1);
      metaEl.textContent = `Clip #${clip.rank ?? currentIndex + 1} · ${dur}s · score ${(clip.score || 0).toFixed(2)}`;
      princEl.textContent = clip.principle ? `Principle: ${clip.principle}` : '';

      const clipDur = clip.end_s - clip.start_s;
      trimStart.min = 0; trimStart.max = clipDur; trimStart.value = 0;
      trimEnd.min = 0;   trimEnd.max = clipDur;   trimEnd.value = clipDur;
      startVal.textContent = '0.0s';
      endVal.textContent   = clipDur.toFixed(1) + 's';
    }

    trimStart.addEventListener('input', () => {
      startVal.textContent = parseFloat(trimStart.value).toFixed(1) + 's';
    });
    trimEnd.addEventListener('input', () => {
      endVal.textContent = parseFloat(trimEnd.value).toFixed(1) + 's';
    });

    async function sendFeedback(action) {
      if (!currentClip) return;
      const body = { action };
      if (action === 'trim') {
        body.trim_start_s = parseFloat(trimStart.value);
        body.trim_end_s   = parseFloat(trimEnd.value);
      }
      try {
        const resp = await fetch(`/clips/${currentClip.id}/feedback`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
          credentials: 'include',
        });
        if (resp.ok) {
          flash.textContent = action === 'trim' ? 'Trim saved ✓' : `${action} recorded ✓`;
          setTimeout(() => { flash.textContent = ''; }, 1500);
          if (action !== 'trim') loadNext();
        }
      } catch (e) {
        flash.textContent = 'Error — try again';
      }
    }

    function loadNext() {
      currentIndex++;
      if (currentIndex < clips.length) {
        loadClip(clips[currentIndex]);
      } else {
        metaEl.textContent = 'All clips reviewed! Great work.';
        player.src = '';
        princEl.textContent = '';
        flash.textContent = '';
        setTimeout(() => { window.location = '/'; }, 2000);
      }
    }
  </script>

  <footer class="footer">
    <a href="/static/tos.html">Terms</a>
    <a href="/static/privacy.html">Privacy</a>
    <span>© AutoClip 2026</span>
  </footer>
</body>
</html>
